<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hotel Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2 class="text-center">Hotel Guest Registration</h2>

<form id="guestForm" class="row g-3">
  <div class="col-md-6">
    <input type="text" id="name" class="form-control" placeholder="Full Name">
  </div>

  <div class="col-md-6">
    <input type="text" id="phone" class="form-control" placeholder="Phone Number">
  </div>

  <div class="col-md-6">
    <input type="email" id="email" class="form-control" placeholder="Email">
  </div>

  <div class="col-md-6">
    <input type="text" id="aadhar" class="form-control" placeholder="Aadhar Number">
  </div>

  <div class="col-12">
    <textarea id="address" class="form-control" placeholder="Address"></textarea>
  </div>

  <div class="col-md-6">
    <input type="date" id="checkin" class="form-control">
  </div>

  <div class="col-md-6">
    <input type="date" id="checkout" class="form-control">
  </div>

  <div class="col-md-6">
    <input type="number" id="adults" class="form-control" placeholder="No of Adults">
  </div>

  <div class="col-12">
    <textarea id="purpose" class="form-control" placeholder="Purpose of Visit"></textarea>
  </div>

  <div class="col-12 text-center">
    <button class="btn btn-primary">Submit</button>
  </div>
</form>

<div id="message" class="mt-3 text-center"></div>

<script type="module" src="./js/formHandler.js"></script>
</body>
</html>
