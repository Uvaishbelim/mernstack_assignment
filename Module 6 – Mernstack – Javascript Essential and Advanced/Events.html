<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Button Click Example</title>
</head>
<body>

  <button id="myButton">Click Me</button>

  <script>
    // Select the button
    const button = document.getElementById("myButton");

    // Add event listener
    button.addEventListener("click", function() {
      alert("Button clicked!");
    });
  </script>

</body>
</html>
