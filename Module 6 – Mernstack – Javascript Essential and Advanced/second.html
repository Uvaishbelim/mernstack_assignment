<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Declaring variables of different data types

// String
let myName = "Uvaish";

// Number
let age = 23;

// Boolean
let isDeveloper = true;

// Null
let emptyValue = null;

// Undefined
let notAssigned;

// Logging values and their types

console.log("Value:", myName, "| Type:", typeof myName);
console.log("Value:", age, "| Type:", typeof age);
console.log("Value:", isDeveloper, "| Type:", typeof isDeveloper);
console.log("Value:", emptyValue, "| Type:", typeof emptyValue);
console.log("Value:", notAssigned, "| Type:", typeof notAssigned);
    </script>
</body>
</html>
