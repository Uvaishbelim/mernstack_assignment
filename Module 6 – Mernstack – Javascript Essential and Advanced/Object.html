<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let car = {
            brand: "Toyota",
            model: "Corolla",
            year: 2020
        };

        // Access and print brand & model
        console.log("Brand:", car.brand);
        console.log("Model:", car.model);

        // Update the year
        car.year = 2023;

        // Add a new property (color)
        car.color = "Black";

        // Final object
        console.log(car);
    </script>
</body>

</html>
