<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Background Change</title>
</head>
<body>

  <h2>Wait 5 seconds...</h2>

  <script>
    setTimeout(() => {
      document.body.style.backgroundColor = "lightblue";
    }, 5000); // 5000ms = 5 seconds
  </script>

</body>
</html>
