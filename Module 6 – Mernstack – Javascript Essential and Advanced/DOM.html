<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Paragraph Update</title>
</head>
<body>

  <p id="text">Hello, World!</p>

  <script>
    // Select the paragraph
    const para = document.getElementById("text");

    // Change the text
    para.textContent = "JavaScript is fun!";

    // Change the color
    para.style.color = "blue";
  </script>

</body>
</html>
