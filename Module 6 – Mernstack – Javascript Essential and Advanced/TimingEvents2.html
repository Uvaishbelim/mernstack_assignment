<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Clock</title>
</head>
<body>

  <h1 id="clock"></h1>

  <script>
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString();
      document.getElementById("clock").textContent = time;
    }

    // Run every second
    setInterval(updateClock, 1000);

    // Call once immediately (no delay at start)
    updateClock();
  </script>

</body>
</html>
