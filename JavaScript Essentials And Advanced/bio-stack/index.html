<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Stack Builder</title>

    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <div class="profile-card">

        <img
            src="https://via.placeholder.com/120"
            alt="Profile"
            class="profile-img"
        >

        <h1>Creator Profile</h1>

        <p>Create and manage your social links</p>

        <button id="themeBtn">
            Toggle Theme
        </button>

        <form id="linkForm">

            <input
                type="text"
                id="title"
                placeholder="Link Title"
            >

            <input
                type="text"
                id="url"
                placeholder="https://example.com"
            >

            <button type="submit">
                Add Link
            </button>

        </form>

        <p id="error"></p>

        <div id="preview"></div>

    </div>

</div>

<script type="module" src="./js/app.js"></script>

</body>
</html>
